<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slither Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #060b18;
      --surface:   rgba(10, 18, 40, 0.92);
      --border:    rgba(80, 180, 255, 0.18);
      --accent:    #00d4ff;
      --accent2:   #7b2fff;
      --text:      #e8f4ff;
      --muted:     rgba(200, 220, 255, 0.45);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
    }

    #canvas {
      display: block;
      position: fixed; top: 0; left: 0;
      image-rendering: pixelated;
    }

    /* ── HUD ── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #score-display {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      letter-spacing: 2px;
    }

    #leaderboard {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 180px;
      backdrop-filter: blur(12px);
      font-size: 13px;
    }

    #leaderboard h3 {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .lb-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--muted);
      font-weight: 600;
    }
    .lb-row.me { color: var(--accent); }
    .lb-row .rank { opacity: 0.5; min-width: 18px; }
    .lb-row .lname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-row .lscore { font-family: 'Orbitron', monospace; font-size: 11px; }

    #ping-display {
      position: absolute;
      bottom: 10px; left: 14px;
      font-size: 12px;
      color: var(--muted);
    }

    #minimap {
      position: absolute;
      bottom: 16px; right: 16px;
      width: 130px; height: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    /* ── Screens ── */
    .screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
      background: radial-gradient(ellipse at center, rgba(6,11,24,0.6) 0%, rgba(6,11,24,0.95) 100%);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.08), 0 32px 64px rgba(0,0,0,0.6);
      animation: panelIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes panelIn {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .panel h1 {
      font-family: 'Orbitron', monospace;
      font-size: 38px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .panel .sub {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .panel input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
    }

    .panel input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.12);
    }

    .panel input::placeholder { color: var(--muted); }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      pointer-events: all;
      width: 100%;
      transition: opacity 0.2s, transform 0.15s;
      text-transform: uppercase;
    }

    .btn:hover  { opacity: 0.88; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .hints {
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    .death-score {
      font-family: 'Orbitron', monospace;
      font-size: 44px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent);
      margin: 12px 0 24px;
    }

    #death-screen { display: none; }
    #menu-screen  { display: flex; }

    /* ── Particles canvas ── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="canvas"></canvas>

<div id="hud">
  <div id="score-display">SCORE: <span id="score-val">0</span></div>
  <div id="leaderboard">
    <h3>&#9733; Rankings</h3>
    <div id="lb-rows"></div>
  </div>
  <div id="ping-display">PING: <span id="ping-val">--</span> ms</div>
  <canvas id="minimap"></canvas>
</div>

<!-- Menu -->
<div class="screen" id="menu-screen">
  <div class="panel">
    <h1>SLITHER</h1>
    <p class="sub">Grow big. Destroy all.</p>
    <input id="name-input" type="text" placeholder="Enter your name" maxlength="20" autocomplete="off" />
    <button class="btn" id="play-btn">PLAY</button>
    <div id="conn-status" style="margin:10px 0 4px;font-size:13px;color:#e67e22;">⚡ Connecting...</div>
    <div class="hints">
      🖱 Move mouse to steer<br>
      🖱 Hold left click or right click to boost<br>
      📱 Touch &amp; hold to boost on mobile
    </div>
  </div>
</div>

<!-- Death Screen -->
<div class="screen" id="death-screen">
  <div class="panel">
    <h1>DEAD</h1>
    <div class="death-score" id="death-score-val">0</div>
    <input id="respawn-name" type="text" placeholder="Enter your name" maxlength="20" autocomplete="off" />
    <button class="btn" id="respawn-btn">RESPAWN</button>
  </div>
</div>

<script src="/socket.io/socket.io.js" onerror="document.getElementById('play-btn').textContent='❌ SERVER NOT RUNNING';document.getElementById('play-btn').style.background='#c0392b';"></script>
<script>
  window.addEventListener('error', (e) => {
    const btn = document.getElementById('play-btn');
    btn.textContent = '❌ JS ERROR – check console';
    btn.style.background = '#c0392b';
    console.error('Game error:', e.message, e.filename, e.lineno);
  });
</script>
<script src="game.js"></script>
</body>
</html>
